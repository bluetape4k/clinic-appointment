version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 8
    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"
      spring:
        patterns:
          - "org.springframework*"
          - "io.spring*"
      testcontainers:
        patterns:
          - "org.testcontainers*"
      jackson2:
        patterns:
          - "com.fasterxml.jackson*"
      jackson3:
        patterns:
          - "tools.jackson*"
      bluetape4k:
        patterns:
          - "io.github.bluetape4k*"
    ignore:
      # <central-dependency-ignore by scripts/sync-dependabot-ignores.py>
      # Versions below are governed by bluetape4k-dependencies.
      # Update the central catalog first, then propagate downstream.
      - dependency-name: "io.github.bluetape4k*"
      - dependency-name: "org.jetbrains.kotlin*"
      - dependency-name: "org.jetbrains.kotlinx*"
      - dependency-name: "org.jetbrains.dokka"
      - dependency-name: "org.jetbrains.kotlinx:kover-gradle-plugin"
      - dependency-name: "io.spring.gradle:dependency-management-plugin"
      - dependency-name: "org.springframework.boot"
      - dependency-name: "org.springframework.boot:*"
      - dependency-name: "com.fasterxml.jackson*"
      - dependency-name: "tools.jackson*"
      - dependency-name: "org.jetbrains.exposed:*"
      - dependency-name: "io.lettuce:lettuce-core"
      - dependency-name: "org.redisson:*"
      - dependency-name: "org.apache.kafka:*"
      - dependency-name: "org.springframework.kafka:*"
      - dependency-name: "io.projectreactor.kafka:*"
      - dependency-name: "org.testcontainers:*"
      - dependency-name: "org.apache.fory:*"
      - dependency-name: "software.amazon.awssdk:*"
      - dependency-name: "aws.sdk.kotlin:*"
      - dependency-name: "io.ktor:*"
      - dependency-name: "org.slf4j:*"
      - dependency-name: "com.google.guava:guava"
      - dependency-name: "org.ow2.asm:*"
      - dependency-name: "com.github.luben:zstd-jni"
      - dependency-name: "jakarta.xml.bind:jakarta.xml.bind-api"
      - dependency-name: "com.hazelcast:hazelcast"
      - dependency-name: "com.sksamuel.scrimage:*"
      - dependency-name: "ai.timefold.solver:*"
      - dependency-name: "org.flywaydb:*"
      - dependency-name: "com.gradleup.shadow"
      - dependency-name: "org.springdoc:*"
      - dependency-name: "org.postgresql:postgresql"
      - dependency-name: "com.mysql:mysql-connector-j"
      - dependency-name: "io.r2dbc:r2dbc-h2"
      - dependency-name: "io.projectreactor:reactor-bom"
      - dependency-name: "io.gatling*"
      - dependency-name: "io.github.hakky54:logcaptor"
      - dependency-name: "io.agroal:*"
      - dependency-name: "org.javamoney:moneta"
      - dependency-name: "org.mybatis.dynamic-sql:mybatis-dynamic-sql"
      - dependency-name: "org.webjars:webjars-locator-core"
      - dependency-name: "org.apache.commons:commons-csv"
      - dependency-name: "org.apache.commons:commons-exec"
      - dependency-name: "org.apache.commons:commons-pool2"
      - dependency-name: "commons-io:commons-io"
      - dependency-name: "commons-codec:commons-codec"
      - dependency-name: "commons-logging:commons-logging"
      # </central-dependency-ignore>
      # Compatibility-line aliases such as jackson2/jackson3 and spring-boot3/spring-boot4
      # are manual major migrations. Dependabot may still propose patch/minor updates.
      - dependency-name: "com.fasterxml.jackson*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "tools.jackson*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "org.springframework.boot"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "org.springframework.boot:*"
        update-types:
          - "version-update:semver-major"
      # Redis client major baselines follow bluetape4k-projects after validation.
      - dependency-name: "io.lettuce:lettuce-core"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "org.redisson:*"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
