name: Nightly Tests

on:
  schedule:
    - cron: '0 20 * * *'  # 매일 오전 5시 KST (UTC 20:00)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'temurin'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── 1. 빌드 + Detekt ─────────────────────────────────────────────────────────
  build:
    name: Build & Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Build (compile only, frontend 제외)
        run: ./gradlew build -x test -x :frontend:appointment-frontend:build --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Detekt static analysis
        run: ./gradlew detekt --parallel

      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: '**/build/reports/detekt/*.xml'
          retention-days: 7

  # ── 2. Core & Event 테스트 ───────────────────────────────────────────────────
  test-core:
    name: Test / Core & Event
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test core & event modules (retry 3)
        run: |
          for i in 1 2 3; do
            ./gradlew :appointment-core:test :appointment-event:test --parallel && exit 0
            echo "::warning::Attempt $i of 3 failed."
            [ $i -lt 3 ] && sleep 20
          done
          exit 1
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Generate Kover report
        if: always()
        run: |
          ./gradlew \
            :appointment-core:koverXmlReport \
            :appointment-event:koverXmlReport \
            --parallel
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-core
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core
          path: '**/build/reports/kover/'
          retention-days: 7

  # ── 3. Solver 테스트 ─────────────────────────────────────────────────────────
  test-solver:
    name: Test / Solver
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test solver module (retry 3)
        run: |
          for i in 1 2 3; do
            ./gradlew :appointment-solver:test --no-daemon && exit 0
            echo "::warning::Attempt $i of 3 failed."
            [ $i -lt 3 ] && sleep 20
          done
          exit 1
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Generate Kover report
        if: always()
        run: ./gradlew :appointment-solver:koverXmlReport
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-solver
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-solver
          path: '**/build/reports/kover/'
          retention-days: 7

  # ── 4. API 테스트 (H2 / PostgreSQL / MySQL) ───────────────────────────────────
  test-api:
    name: Test / API (${{ matrix.db }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - db: H2
            profiles: "test"
          - db: PostgreSQL
            profiles: "test,test-postgresql"
          - db: MySQL
            profiles: "test,test-mysql"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test API module (${{ matrix.db }}) (retry 3)
        env:
          DB_PROFILES: ${{ matrix.profiles }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          for i in 1 2 3; do
            ./gradlew :appointment-api:test --no-daemon \
              -Dspring.profiles.active="$DB_PROFILES" && exit 0
            echo "::warning::Attempt $i of 3 failed."
            [ $i -lt 3 ] && sleep 20
          done
          exit 1

      - name: Generate Kover report
        if: always()
        run: ./gradlew :appointment-api:koverXmlReport
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-api-${{ matrix.db }}
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api-${{ matrix.db }}
          path: '**/build/reports/kover/'
          retention-days: 7

  # ── 5. Notification 테스트 ───────────────────────────────────────────────────
  test-notification:
    name: Test / Notification
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test notification module (retry 3)
        run: |
          for i in 1 2 3; do
            ./gradlew :appointment-notification:test --no-daemon && exit 0
            echo "::warning::Attempt $i of 3 failed."
            [ $i -lt 3 ] && sleep 20
          done
          exit 1
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Generate Kover report
        if: always()
        run: ./gradlew :appointment-notification:koverXmlReport
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-notification
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-notification
          path: '**/build/reports/kover/'
          retention-days: 7

  # ── 6. 프론트엔드 빌드 ───────────────────────────────────────────────────────
  build-frontend:
    name: Build / Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/appointment-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/appointment-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/appointment-frontend/dist/
          retention-days: 3

  # ── 7. 커버리지 집계 ─────────────────────────────────────────────────────────
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-core, test-solver, test-api, test-notification]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-artifacts
          merge-multiple: true
        continue-on-error: true

      - name: Coverage summary
        if: always()
        run: |
          if [ -d coverage-artifacts ]; then
            python3 .github/scripts/aggregate-kover-coverage.py coverage-artifacts
          else
            echo "No coverage artifacts found"
          fi
        continue-on-error: true

      - name: Upload to Coveralls
        if: always()
        uses: coverallsapp/github-action@v2
        with:
          files: coverage-artifacts/**/*.xml
          token: ${{ secrets.COVERALLS_REPO_TOKEN }}
          fail-on-error: false
        continue-on-error: true

  # ── 8. Nightly 상태 집계 ─────────────────────────────────────────────────────
  nightly-status:
    name: Nightly Status
    runs-on: ubuntu-latest
    needs: [build, build-frontend, test-core, test-solver, test-api, test-notification]
    if: always()
    steps:
      - name: Check all jobs
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "::error::Nightly tests failed"
            exit 1
          fi
          echo "Nightly passed"
