name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'temurin'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── 0. 시크릿 스캔 ────────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks
        run: gitleaks detect --source . --redact --no-git --config .gitleaks.toml

  # ── 1. Gradle Wrapper 검증 ──────────────────────────────────────────────────
  validate-wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4

  # ── 2. 빌드 + Detekt 정적 분석 ─────────────────────────────────────────────
  build:
    name: Build & Detekt
    runs-on: ubuntu-latest
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build (compile only, frontend 제외)
        run: ./gradlew build -x test -x :frontend:appointment-frontend:build --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Detekt static analysis
        run: ./gradlew detekt --parallel

      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: '**/build/reports/detekt/*.xml'
          retention-days: 7

  # ── 3. Core 모듈 테스트 (appointment-core, appointment-event) ────────────────
  test-core:
    name: Test / Core & Event
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test core & event modules
        run: |
          ./gradlew \
            :appointment-core:test \
            :appointment-event:test \
            --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          TESTCONTAINERS_RYUK_DISABLED: "true"  # Testcontainers 사용 모듈 공통 설정

      - name: Generate Kover report
        if: always()
        run: |
          ./gradlew \
            :appointment-core:koverXmlReport \
            :appointment-event:koverXmlReport \
            --parallel
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-core
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core
          path: '**/build/reports/kover/'
          retention-days: 7

  # ── 4. Solver 모듈 테스트 (appointment-solver) ───────────────────────────────
  test-solver:
    name: Test / Solver
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test solver module
        run: ./gradlew :appointment-solver:test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Generate Kover report
        if: always()
        run: ./gradlew :appointment-solver:koverXmlReport
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-solver
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-solver
          path: '**/build/reports/kover/'
          retention-days: 7

  # ── 5. API 모듈 테스트 (appointment-api, H2 / PostgreSQL / MySQL 병렬) ──────────
  test-api:
    name: Test / API (${{ matrix.db }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - db: H2
            profiles: "test"
          - db: PostgreSQL
            profiles: "test,test-postgresql"
          - db: MySQL
            profiles: "test,test-mysql"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test API module (${{ matrix.db }})
        run: ./gradlew :appointment-api:test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dspring.profiles.active=${{ matrix.profiles }}"
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Generate Kover report
        if: always()
        run: ./gradlew :appointment-api:koverXmlReport
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-api-${{ matrix.db }}
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api-${{ matrix.db }}
          path: '**/build/reports/kover/'
          retention-days: 7

  # ── 6. Notification 모듈 테스트 (appointment-notification) ───────────────────
  test-notification:
    name: Test / Notification
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test notification module
        run: ./gradlew :appointment-notification:test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Generate Kover report
        if: always()
        run: ./gradlew :appointment-notification:koverXmlReport
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-notification
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-notification
          path: '**/build/reports/kover/'
          retention-days: 7

  # ── 7. 커버리지 집계 ─────────────────────────────────────────────────────────
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-core, test-solver, test-api, test-notification]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-artifacts
          merge-multiple: true

      - name: Coverage summary
        if: always()
        run: python3 .github/scripts/aggregate-kover-coverage.py coverage-artifacts

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          directory: coverage-artifacts
          files: '**/*.xml'
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── 8. 프론트엔드 빌드 검증 ───────────────────────────────────────────────────
  build-frontend:
    name: Build / Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/appointment-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/appointment-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx ng build --configuration production --dry-run 2>/dev/null || true

      - name: Production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/appointment-frontend/dist/
          retention-days: 3

  # ── 9. Flyway 마이그레이션 검증 (H2 / PostgreSQL / MySQL) ─────────────────────
  flyway-migration:
    name: Flyway Migration / ${{ matrix.db }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - db: H2
            test-class: "io.bluetape4k.clinic.appointment.api.migration.FlywayMigrationTest"
          - db: PostgreSQL
            test-class: "io.bluetape4k.clinic.appointment.api.migration.FlywayPostgreSQLMigrationTest"
          - db: MySQL
            test-class: "io.bluetape4k.clinic.appointment.api.migration.FlywayMySQLMigrationTest"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Verify Flyway migration (${{ matrix.db }})
        run: |
          ./gradlew :appointment-api:test \
            --tests "${{ matrix.test-class }}" \
            --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          TESTCONTAINERS_RYUK_DISABLED: "true"

  # ── 10. CI 상태 집계 ─────────────────────────────────────────────────────────
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [gitleaks, build, build-frontend, flyway-migration, test-core, test-solver, test-api, test-notification]
    if: always()
    steps:
      - name: Check all jobs
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "::error::CI failed"
            exit 1
          fi
          echo "CI passed"
