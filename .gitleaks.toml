title = "clinic-appointment gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Allowlisted paths and patterns"

paths = [
    '''.idea/''',
    '''build/''',
    '''.gradle/''',
    '''gradle/wrapper/''',
    '''src/test/resources/''',
    '''src/test/.*/security/TestJwtProvider\.kt''',
    '''src/gatling/''',
    '''docs/''',
    '''README\.md''',
    '''README\.ko\.md''',
    '''node_modules/''',
]

regexes = [
    '''YOUR_.*_HERE''',
    '''example[-_]key''',
    '''test[-_]api[-_]key''',
    '''jwt\.secret=test-secret.*''',
]
