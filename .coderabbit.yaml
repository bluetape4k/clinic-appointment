# CodeRabbit AI Code Review Configuration
# Docs: https://docs.coderabbit.ai/configure/yaml
# Install GitHub App: https://github.com/apps/coderabbitai

language: "ko-KR"
tone_instructions: "간결하고 실행 가능한 리뷰를 제공하세요. 중요한 문제를 먼저 언급하세요."
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - develop

  path_instructions:
    - path: "**/*.kt"
      instructions: |
        Kotlin 2.3 + Spring Boot 4.x + Exposed ORM 프로젝트입니다.
        - 모든 Exposed 연산은 반드시 `transaction {}` 블록 안에서 실행해야 합니다.
        - `!!` 연산자 사용 금지. `?.let {}`, `?:`, `requireNotNull()` 사용.
        - bluetape4k 확장: `requireNotBlank()`, `requireNotNull()` 등을 사용하세요 (kotlin stdlib 대신).
        - `val` 우선, `var` 지양. 불변 컬렉션 사용.
        - `@Configuration`은 반드시 `proxyBeanMethods = false` 명시.
        - `@Profile`로 환경 분리, `@ConditionalOnProperty`로 조건부 빈 등록.
        - KLogging companion object 패턴으로 로거를 선언하세요.
    - path: "**/*Test*.kt"
      instructions: |
        JUnit5 + Kluent + MockK 테스트 코드입니다.
        - Testcontainers: `@Testcontainers` 어노테이션 없이 bluetape4k 싱글톤 패턴 사용.
        - `@BeforeEach`에서 `SchemaUtils.createMissingTablesAndColumns()` + `Table.deleteAll()` 호출 확인.
        - 테스트 이름은 backtick 문자열로 행동을 명확히 설명해야 합니다.
    - path: "**/db/migration/**/*.sql"
      instructions: |
        Flyway 마이그레이션 파일입니다.
        - 버전 번호 순서를 확인하세요 (V1__, V2__, ...).
        - db/migration/{vendor}/ 경로 구조 유지 (h2, postgresql, mysql).
        - `scheduling_*` 테이블명은 변경 불가입니다.
        - PostgreSQL과 MySQL 파일 간 DDL 동기화 여부를 확인하세요.
    - path: "**/build.gradle.kts"
      instructions: |
        Gradle Kotlin DSL 빌드 파일입니다.
        - 의존성 버전은 `buildSrc/src/main/kotlin/Libs.kt`를 통해 관리하세요.
        - Spring Boot 4.x 모듈은 `Libs.springBoot("module")` 또는 `Libs.springBootStarter("module")` 사용.
        - 직접 버전 문자열 하드코딩 금지.

  finishing_touches:
    docstrings:
      enabled: false

chat:
  auto_reply: true
